id: ticket_routing_logistic_full
name: "Маршрутизация тикетов — Logistic TS (categorical + time_of_day)"

arms:
  - id: agent_maria
    name: "Мария С."
    metadata: {capacity: 8, cost_per_hour: 150}
  - id: agent_ivan
    name: "Иван К."
    metadata: {capacity: 8, cost_per_hour: 150}
  - id: agent_alexey
    name: "Алексей Д."
    metadata: {capacity: 8, cost_per_hour: 180}
  - id: agent_olga
    name: "Ольга Р."
    metadata: {capacity: 8, cost_per_hour: 150}
  - id: agent_dmitry
    name: "Дмитрий В."
    metadata: {capacity: 8, cost_per_hour: 120}

context:
  mode: features
  features:
    - name: ticket_category
      type: categorical
      categories: ["billing", "tech", "complaint", "onboard"]
    - name: client_tier
      type: categorical
      categories: ["smb", "mid", "enterprise"]
    - name: time_of_day
      type: continuous

reward:
  type: binary
  signals:
    - {name: fcr,       weight:  1.0, timeout_hours: 72, default_on_timeout: 0.0}
    - {name: reopen,    weight: -0.5, timeout_hours: 72, default_on_timeout: 0.0}
    - {name: csat_high, weight:  0.3, timeout_hours: 96, default_on_timeout: 0.0}
  aggregation: weighted_sum

objective:
  type: max_probability

constraints:
  - {type: min_traffic, value: 0.03}

hyperparams:
  model_type: logistic
  min_exploration: 0.03
  logistic:
    prior_variance: 2.0
    regularization: 0.01
    feature_scaling: false
  update_mode: realtime
